<script>
// ── Auth ──────────────────────────────────────────────────────────────────
const AUTH_KEY = 'tg_auth_v1';

function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === APP_PASSWORD) {
    sessionStorage.setItem(AUTH_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadRecordings();
  } else {
    const inp = document.getElementById('pwInput');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    document.getElementById('lockErr').textContent = 'Incorrect password. Please try again.';
    inp.value = '';
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

// ── Filename parser ───────────────────────────────────────────────────────
// Format: YYYY-MM-DD HH MM SS - X-Title - N of T _ Series _ SubSeries
function parseFilename(name) {
  // Strip extension
  name = name.replace(/\.[^/.]+$/, '').trim();

  // Extract date (YYYY-MM-DD at start)
  const dateMatch = name.match(/^(\d{4}-\d{2}-\d{2})/);
  const date = dateMatch ? dateMatch[1] : null;

  // Remove date + time prefix (YYYY-MM-DD HH MM SS -)
  let rest = name.replace(/^\d{4}-\d{2}-\d{2}[\s\d]*-\s*/, '').trim();

  // Remove leading thread letter (e.g. "B-")
  rest = rest.replace(/^[A-Z]-/, '').trim();

  // Split on " - " to get title+part section and series section
  const dashParts = rest.split(/\s+-\s+/);
  let titlePart = dashParts[0] || '';
  let seriesPart = dashParts.slice(1).join(' - ');

  // Extract part info from title section: "Title - N of T"
  const partMatch = titlePart.match(/^(.*?)\s*-?\s*(\d+)\s+of\s+(\d+)\s*$/i);
  let title = titlePart.trim();
  let partNum = 1, totalParts = 1;
  if (partMatch) {
    title = partMatch[1].trim();
    partNum = parseInt(partMatch[2]);
    totalParts = parseInt(partMatch[3]);
  }

  // Parse series from underscore-separated remainder
  const seriesBits = seriesPart ? seriesPart.split(/\s*_\s*/).map(s => s.trim()).filter(Boolean) : [];
  const series = seriesBits[0] || '';
  const subSeries = seriesBits[1] || '';

  return { date, title, partNum, totalParts, series, subSeries };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function monthKey(dateStr) {
  if (!dateStr) return 'Unknown';
  const [y, m] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// ── Google Drive loader ───────────────────────────────────────────────────
// Uses the public folder listing trick — no API key needed for public folders.
// We fetch the folder page HTML and parse file names + IDs from it.
// For direct audio streaming we use the Drive export/preview URL.

let allSermons = [];   // grouped
let filteredSermons = [];
let activeSeries = 'all';
let sortNewest = true;

async function loadRecordings() {
  try {
    // Fetch folder listing via public API (no key needed for public folders)
    const url = `https://www.googleapis.com/drive/v3/files?q='${GDRIVE_FOLDER}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&orderBy=name&key=AIzaSyD-dummy`;
    // Since we can't use a real API key in a static file without exposing it,
    // we use the public folder embed approach instead.
    await loadViaEmbed();
  } catch(e) {
    showError('Could not load recordings. ' + e.message);
    document.getElementById('loadingState').style.display = 'none';
  }
}

async function loadViaEmbed() {
  // Fetch the public Google Drive folder page to scrape file list
  // This works for folders shared as "Anyone with the link can view"
  try {
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent('https://drive.google.com/drive/folders/' + GDRIVE_FOLDER)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Could not reach Google Drive');
    const html = await res.text();
    const files = parseDrivePage(html);
    if (files.length === 0) {
      showDemoData();
      return;
    }
    processFiles(files);
  } catch(e) {
    // Fallback: show demo data so the UI is still useful
    showDemoData();
  }
}

function parseDrivePage(html) {
  // Extract file IDs and names from Drive folder HTML
  const files = [];
  // Drive embeds file data as JSON in the page
  const matches = [...html.matchAll(/"([0-9A-Za-z_-]{25,})"[^"]*?"([^"]+\.(mp3|m4a|wav|ogg|aac))"/gi)];
  for (const m of matches) {
    files.push({ id: m[1], name: m[2] });
  }
  // Also try another pattern
  const matches2 = [...html.matchAll(/\["([^"]+\.(mp3|m4a|wav|ogg|aac))"[^\]]*?"([0-9A-Za-z_-]{25,})"/gi)];
  for (const m of matches2) {
    if (!files.find(f => f.id === m[3])) {
      files.push({ id: m[3], name: m[1] });
    }
  }
  return files;
}

function driveStreamUrl(fileId) {
  // Direct streaming URL for public Drive files
  return `https://drive.google.com/uc?export=download&id=${fileId}&confirm=t`;
}

function processFiles(files) {
  // Only audio files
  const audio = files.filter(f => /\.(mp3|m4a|wav|ogg|aac)$/i.test(f.name));
  // Parse each
  const parsed = audio.map(f => ({ ...parseFilename(f.name), id: f.id, raw: f.name }));
  // Group by (date + title)
  const groups = {};
  for (const p of parsed) {
    const key = (p.date || '') + '|' + p.title.toLowerCase();
    if (!groups[key]) groups[key] = { date: p.date, title: p.title, series: p.series, subSeries: p.subSeries, parts: [] };
    groups[key].parts.push(p);
  }
  // Sort parts within each group
  for (const g of Object.values(groups)) {
    g.parts.sort((a, b) => a.partNum - b.partNum);
  }
  allSermons = Object.values(groups);
  document.getElementById('loadingState').style.display = 'none';
  buildPills();
  applyFilters();
}

    { id: 'demo3', name: '2023-04-22 12 32 48 - B-Smell of Raindrops - 3 of 3 _ Smelling Sense _ Warring Body I.mp3' },
    { id: 'demo4', name: '2023-04-15 11 00 00 - B-The Sound of Silence - 1 of 2 _ Hearing Series _ Warring Body I.mp3' },

function showError(msg, isInfo = false) {

// ── UI rendering ──────────────────────────────────────────────────────────
function buildPills() {
  const seriesSet = new Set();
  for (const s of allSermons) { if (s.series) seriesSet.add(s.series); }
  const row = document.getElementById('pillsRow');
  row.innerHTML = `<div class="pill on" data-series="all" onclick="setSeries(this,'all')">All</div>`;
  for (const s of [...seriesSet].sort()) {
    const d = document.createElement('div');
    d.className = 'pill';
    d.dataset.series = s;
    d.textContent = s;
    d.onclick = () => setSeries(d, s);
    row.appendChild(d);
  }
}

function setSeries(el, val) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  activeSeries = val;
  applyFilters();
}

function toggleSort() {
  sortNewest = !sortNewest;
  document.getElementById('sortBtn').textContent = sortNewest ? 'Newest ↓' : 'Oldest ↑';
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = allSermons.filter(s => {
    const matchSeries = activeSeries === 'all' || s.series === activeSeries;
    const matchQ = !q || s.title.toLowerCase().includes(q) || (s.series||'').toLowerCase().includes(q) || (s.subSeries||'').toLowerCase().includes(q);
    return matchSeries && matchQ;
  });
  list.sort((a, b) => {
    const da = a.date || '', db = b.date || '';
    return sortNewest ? db.localeCompare(da) : da.localeCompare(db);
  });
  filteredSermons = list;
  renderList();
}

function renderList() {
  const container = document.getElementById('recList');
  if (filteredSermons.length === 0) {
    container.innerHTML = '<div class="empty-state">No recordings found.<br>Try a different search or filter.</div>';
    return;
  }
  let html = '';
  let lastMonth = '';
  for (let i = 0; i < filteredSermons.length; i++) {
    const s = filteredSermons[i];
    const mo = monthKey(s.date);
    if (mo !== lastMonth) {
      html += `<div class="month-label">${mo}</div>`;
      lastMonth = mo;
    }
    const seriesStr = [s.series, s.subSeries].filter(Boolean).join(' · ');
    const partsLabel = s.parts.length === 1 ? '1 part' : `${s.parts.length} parts`;
    const isActive = currentSermonIdx === i && currentSermonIdx !== -1;
    html += `
      <div class="rec-card${isActive ? ' active' : ''}" onclick="selectSermon(${i})">
        <div class="rec-thumb">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>
        </div>
        <div class="rec-body">
          <div class="rec-title">${esc(s.title)}</div>
          <div class="rec-date">${formatDate(s.date)}</div>
          ${seriesStr ? `<div class="rec-series">${esc(seriesStr)}</div>` : ''}
        </div>
        <div class="rec-badge">${partsLabel}</div>
      </div>`;
  }
  container.innerHTML = html;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Audio player ──────────────────────────────────────────────────────────
const audio = document.getElementById('audioEl');
let currentSermonIdx = -1;
let currentPartIdx = 0;
let isPlaying = false;

function selectSermon(idx) {
  currentSermonIdx = idx;
  currentPartIdx = 0;
  renderList();
  loadCurrentPart();
  playAudio();
}

function loadCurrentPart() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  const part = sermon.parts[currentPartIdx];
  document.getElementById('nowTitle').textContent = sermon.title;
  const meta = [formatDate(sermon.date), [sermon.series, sermon.subSeries].filter(Boolean).join(' · ')].filter(Boolean).join(' · ');
  document.getElementById('nowMeta').textContent = meta;
  updateTimeStr();
  buildPartDots();
  document.getElementById('progFill').style.width = '0%';
  // Load audio — use Drive streaming URL for real files, silence for demo
  if (part.id.startsWith('demo')) {
    audio.src = '';
  } else {
    audio.src = driveStreamUrl(part.id);
  }
  audio.load();
}

function buildPartDots() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  const n = sermon.parts.length;
  let html = '';
  for (let i = 0; i < n; i++) {
    const cls = i < currentPartIdx ? 'done' : i === currentPartIdx ? 'current' : '';
    html += `<div class="dot ${cls}" onclick="jumpPart(${i})"></div>`;
  }
  document.getElementById('partsDots').innerHTML = html;
}

function jumpPart(i) {
  currentPartIdx = i;
  loadCurrentPart();
  if (isPlaying) playAudio();
}

function updateTimeStr() {
  if (currentSermonIdx < 0) { document.getElementById('timeStr').textContent = '—'; return; }
  const sermon = filteredSermons[currentSermonIdx];
  const n = sermon.parts.length;
  document.getElementById('timeStr').textContent = n > 1 ? `Part ${currentPartIdx + 1} of ${n}` : '—';
}

function playAudio() {
  isPlaying = true;
  updatePlayIcon();
  audio.play().catch(() => {});
}

function togglePlay() {
  if (!isPlaying) {
    isPlaying = true;
    audio.play().catch(() => {});
  } else {
    isPlaying = false;
    audio.pause();
  }
  updatePlayIcon();
}

function updatePlayIcon() {
  document.getElementById('playIcon').setAttribute('d',
    isPlaying
      ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
      : 'M8 5v14l11-7z'
  );
}

function nextPart() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  if (currentPartIdx < sermon.parts.length - 1) {
    currentPartIdx++;
    loadCurrentPart();
    if (isPlaying) playAudio();
  } else if (currentSermonIdx < filteredSermons.length - 1) {
    currentSermonIdx++;
    currentPartIdx = 0;
    renderList();
    loadCurrentPart();
    if (isPlaying) playAudio();
  }
  buildPartDots();
  updateTimeStr();
}

function prevPart() {
  if (currentSermonIdx < 0) return;
  if (currentPartIdx > 0) {
    currentPartIdx--;
  } else if (currentSermonIdx > 0) {
    currentSermonIdx--;
    currentPartIdx = filteredSermons[currentSermonIdx].parts.length - 1;
    renderList();
  }
  loadCurrentPart();
  if (isPlaying) playAudio();
  buildPartDots();
  updateTimeStr();
}

// Progress bar
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progFill').style.width = pct.toFixed(1) + '%';
});

audio.addEventListener('ended', () => { nextPart(); });

function scrub(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('progBar');
  const pct = e.offsetX / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
}

// Boot
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  loadRecordings();
}
</script>
</body>
</html>
