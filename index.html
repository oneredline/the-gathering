<script>
// ── Auth ──────────────────────────────────────────────────────────────────

// ── Filename parser ───────────────────────────────────────────────────────
// Format: YYYY-MM-DD HH MM SS - X-Title - N of T _ Series _ SubSeries
function parseFilename(name) {
  name = name.replace(/\.[^/.]+$/, '').trim();

  // Extract date (YYYY-MM-DD)
  const dateMatch = name.match(/^(\d{4}-\d{2}-\d{2})/);
  const date = dateMatch ? dateMatch[1] : null;

  // Remove: "2023-04-22 12 28 40 - B-" or "2023-04-22 12 28 40 - "
  let rest = name.replace(/^\d{4}-\d{2}-\d{2}[\s\d]+-\s*(?:[A-Za-z]-)?/, '').trim();

  // rest is now like:
  // "Smell of Raindrops - 1 of 3 _ Smelling Sense _ Warring Body I"  (multi-part)
  // "Smell of Raindrops - "Marvel Not" _ Apr 6, 2023"                (single, titled)
  // "Smell of Raindrops - Warning recording _ May 5, 2023"           (single, no quotes)

  // Split on first " - " to separate subcategory from the rest
  const dashIdx = rest.indexOf(' - ');
  let subcategory = '';
  let after = rest;
  if (dashIdx !== -1) {
    subcategory = rest.slice(0, dashIdx).trim();
    after = rest.slice(dashIdx + 3).trim();
  }

  // "after" is now like:
  // "1 of 3 _ Smelling Sense _ Warring Body I"   (multi-part)
  // '"Marvel Not" _ Apr 6, 2023'                  (single titled)
  // "Warning recording _ May 5, 2023"             (single plain)

  // Check for part number at the start: "N of T _ ..."
  const partMatch = after.match(/^_?\s*(\d+)\s+of\s+(\d+)\s*(?:_\s*(.*))?$/i);
  if (partMatch) {
    const partNum = parseInt(partMatch[1]);
    const totalParts = parseInt(partMatch[2]);
    const remainder = (partMatch[3] || '').trim();
    const bits = remainder.split(/\s*_\s*/).map(s => s.trim()).filter(Boolean);
    // Filter trailing date-like strings
    const clean = bits.filter(b => !/^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\d{1,2}[,\/])/i.test(b));
    const title = clean[0] || remainder || subcategory || 'Untitled';
    const series = clean[1] || '';
    return { date, title, partNum, totalParts, subcategory, series };
  }

  // Single recording — title is first underscore-separated bit
  const bits = after.split(/\s*_\s*/).map(s => s.trim()).filter(Boolean);
  let title = (bits[0] || after).replace(/^[]|[]$/g, '').trim();
  return { date, title, partNum: 1, totalParts: 1, subcategory, series: '' };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function monthKey(dateStr) {
  if (!dateStr) return 'Unknown';
  const [y, m] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// ── Google Drive loader ───────────────────────────────────────────────────
// Uses the public folder listing trick — no API key needed for public folders.
// We fetch the folder page HTML and parse file names + IDs from it.
// For direct audio streaming we use the Drive export/preview URL.

let allSermons = [];   // grouped
let filteredSermons = [];
let activeSeries = 'all';
let sortNewest = true;

async function loadRecordings() {
  try {
    const url = `https://www.googleapis.com/drive/v3/files?q=%27${GDRIVE_FOLDER}%27+in+parents+and+trashed%3Dfalse&fields=files(id,name,mimeType)&orderBy=name&pageSize=1000&key=${GDRIVE_API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || 'HTTP ' + res.status);
    }
    const data = await res.json();
    const allFiles = data.files || [];
    if (allFiles.length === 0) { showDemoData(); return; }
    processFiles(allFiles);
  } catch(e) {
    showError('Error: ' + e.message, true);
    showDemoData();
  }
}



function driveStreamUrl(fileId) {
  return `https://docs.google.com/uc?export=open&id=${fileId}`;
}

function processFiles(files) {
  // Only audio files
  const audio = files.filter(f => /\.(mp3|m4a|wav|ogg|aac)$/i.test(f.name));
  // Parse each
  const parsed = audio.map(f => ({ ...parseFilename(f.name), id: f.id, raw: f.name }));
  // Group by (date + title) — same date + same title = same sermon
  const groups = {};
  for (const p of parsed) {
    const key = (p.date || '') + '|' + p.title.toLowerCase();
    if (!groups[key]) groups[key] = { date: p.date, title: p.title, subcategory: p.subcategory, series: p.series, parts: [] };
    groups[key].parts.push(p);
  }
  // Sort parts within each group
  for (const g of Object.values(groups)) {
    g.parts.sort((a, b) => a.partNum - b.partNum);
  }
  allSermons = Object.values(groups);
  document.getElementById('loadingState').style.display = 'none';
  buildPills();
  applyFilters();
}

    { id: 'demo3', name: '2023-04-22 12 32 48 - B-Smell of Raindrops - 3 of 3 _ Smelling Sense _ Warring Body I.mp3' },
    { id: 'demo4', name: '2023-04-15 11 00 00 - B-The Sound of Silence - 1 of 2 _ Hearing Series _ Warring Body I.mp3' },
    { id: 'demo5', name: '2023-04-15 11 30 00 - B-The Sound of Silence - 2 of 2 _ Hearing Series _ Warring Body I.mp3' },

    { id: 'demo7', name: '2023-03-26 10 00 00 - B-Sight Beyond Sight - 1 of 4 _ Vision Series _ Warring Body I.mp3' },
    { id: 'demo8', name: '2023-03-26 10 30 00 - B-Sight Beyond Sight - 2 of 4 _ Vision Series _ Warring Body I.mp3' },

// ── UI rendering ──────────────────────────────────────────────────────────
function buildPills() {
  const seriesSet = new Set();
  for (const s of allSermons) { if (s.subcategory) seriesSet.add(s.subcategory); }
  const row = document.getElementById('pillsRow');
  row.innerHTML = `<div class="pill on" data-series="all" onclick="setSeries(this,'all')">All</div>`;
  for (const s of [...seriesSet].sort()) {
    const d = document.createElement('div');
    d.className = 'pill';
    d.dataset.series = s;
    d.textContent = s;
    d.onclick = () => setSeries(d, s);
    row.appendChild(d);
  }
}

function setSeries(el, val) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  activeSeries = val;
  applyFilters();
}

function toggleSort() {
  sortNewest = !sortNewest;
  document.getElementById('sortBtn').textContent = sortNewest ? 'Newest ↓' : 'Oldest ↑';
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = allSermons.filter(s => {
    const matchSeries = activeSeries === 'all' || s.subcategory === activeSeries;
    const matchQ = !q || s.title.toLowerCase().includes(q) || (s.series||'').toLowerCase().includes(q) || (s.subSeries||'').toLowerCase().includes(q);
    return matchSeries && matchQ;
  });
  list.sort((a, b) => {
    const da = a.date || '', db = b.date || '';
    return sortNewest ? db.localeCompare(da) : da.localeCompare(db);
  });
  filteredSermons = list;
  renderList();
}

function renderList() {
  const container = document.getElementById('recList');
  if (filteredSermons.length === 0) {
    container.innerHTML = '<div class="empty-state">No recordings found.<br>Try a different search or filter.</div>';
    return;
  }
  let html = '';
  let lastMonth = '';
  for (let i = 0; i < filteredSermons.length; i++) {
    const s = filteredSermons[i];
    const mo = monthKey(s.date);
    if (mo !== lastMonth) {
      html += `<div class="month-label">${mo}</div>`;
      lastMonth = mo;
    }
    const seriesStr = [s.subcategory, s.series].filter(Boolean).join(' · ');
    const partsLabel = s.parts.length === 1 ? '1 part' : `${s.parts.length} parts`;
    const isActive = currentSermonIdx === i && currentSermonIdx !== -1;
    html += `
      <div class="rec-card${isActive ? ' active' : ''}" onclick="selectSermon(${i})">
        <div class="rec-thumb">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>
        </div>
        <div class="rec-body">
          <div class="rec-title">${esc(s.title)}</div>
          <div class="rec-date">${formatDate(s.date)}</div>
          ${seriesStr ? `<div class="rec-series">${esc(seriesStr)}</div>` : ''}
        </div>
        <div class="rec-badge">${partsLabel}</div>
      </div>`;
  }
  container.innerHTML = html;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Audio player ──────────────────────────────────────────────────────────
let currentSermonIdx = -1;
let currentPartIdx = 0;

function selectSermon(idx) {
  currentSermonIdx = idx;
  currentPartIdx = 0;
  renderList();
  loadCurrentPart();
}

function loadCurrentPart() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  const part = sermon.parts[currentPartIdx];

  const totalP = sermon.parts.length;
  const partLabel = totalP > 1 ? ` — Part ${currentPartIdx + 1} of ${totalP}` : '';
  document.getElementById('nowTitle').textContent = sermon.title + partLabel;
  const meta = [formatDate(sermon.date), [sermon.subcategory, sermon.series].filter(Boolean).join(' · ')].filter(Boolean).join(' · ');
  document.getElementById('nowMeta').textContent = meta;
  buildPartDots();

  // Show player, hide placeholder
  document.getElementById('playerPanel').style.display = 'block';
  document.getElementById('playerPlaceholder').style.display = 'none';

  // Load Drive embedded player
  if (part.id.startsWith('demo')) {
    document.getElementById('driveFrame').src = '';
    document.getElementById('drivePlayer').innerHTML = '<div style="padding:12px;color:#666;font-size:13px;text-align:center;">Demo mode — no audio available</div>';
  } else {
    document.getElementById('driveFrame').src = `https://drive.google.com/file/d/${part.id}/preview`;
  }
}

function buildPartDots() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  const n = sermon.parts.length;
  if (n <= 1) { document.getElementById('partsDots').innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < n; i++) {
    const cls = i < currentPartIdx ? 'done' : i === currentPartIdx ? 'current' : '';
    html += `<div class="dot ${cls}" onclick="jumpPart(${i})" style="height:3px;width:20px;border-radius:2px;cursor:pointer;"></div>`;
  }
  document.getElementById('partsDots').innerHTML = html;
}

function jumpPart(i) {
  currentPartIdx = i;
  loadCurrentPart();
}

function nextPart() {
  if (currentSermonIdx < 0) return;
  const sermon = filteredSermons[currentSermonIdx];
  if (currentPartIdx < sermon.parts.length - 1) {
    currentPartIdx++;
  } else if (currentSermonIdx < filteredSermons.length - 1) {
    currentSermonIdx++;
    currentPartIdx = 0;
    renderList();
  }
  loadCurrentPart();
}

function prevPart() {
  if (currentSermonIdx < 0) return;
  if (currentPartIdx > 0) {
    currentPartIdx--;
  } else if (currentSermonIdx > 0) {
    currentSermonIdx--;
    currentPartIdx = filteredSermons[currentSermonIdx].parts.length - 1;
    renderList();
  }
  loadCurrentPart();
}

// Boot
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  loadRecordings();
}
</script>
</body>
</html>
